<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>

    <link rel="stylesheet" href="bootstrap/v-5.3.8/css/bootstrap.css" />
    <link rel="stylesheet" href="css/style.css?v=1" />
  </head>
  <body>

    <div class="text-title">
      <h1>Calculadora</h1>
    </div>

    <div class="container">
      
      <div class="mb-3">
        <label class="form-label"><h3>Primeiro valor</h3></label>
        <input type="number" class="form-control" id="value1" placeholder="número">
      </div>

      <h3>Operação</h3>
      <div class="container-op">
        
        <div class="form-check">
            <input type="radio" name="operation" id="addition" value="addition"/>
            <label for="addition">+ (Adição)</label>    
        </div>

        <div class="form-check">
            <input type="radio" name="operation" id="subtraction" value="subtraction"/>
            <label for="subtraction">- (Subtração)</label>
        </div>

        <div class="form-check">
            <input type="radio" name="operation" id="multiplication" value="multiplication"/>
            <label for="multiplication">* (Multiplicação)</label>
        </div>

        <div class="form-check">
            <input type="radio" name="operation" id="division" value="division"/>
            <label for="division">/ (Divisão)</label>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label"><h3>Segundo valor</h3></label>
        <input type="number" class="form-control" id="value2" placeholder="número">
      </div>
      
      <button type="button" onclick="calculate()" class="btn btn-outline-pink">Calcular</button>

      <div class="card" id="resultCard" style="display: none;">
        <div class="card-body">
            <p id="result"></p>
        </div>
      </div>

    </div>

    <script src="bootstrap/v-5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
